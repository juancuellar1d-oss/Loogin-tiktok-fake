<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apple ID – Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#0071e3;--blue-h:#0077ed;--text:#1d1d1f;--muted:#6e6e73;
      --border:#d2d2d7;--bg:#f5f5f7;--card:#fff;--danger:#ff3b30;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
      background:var(--bg);min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
    }
 
    /* Apple logo */
    .apple-icon{text-align:center;margin-bottom:20px;font-size:44px;line-height:1;}
 
    h1{font-size:28px;font-weight:600;color:var(--text);text-align:center;margin-bottom:6px;letter-spacing:-.3px;}
    .subtitle{font-size:15px;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.5;}
 
    .card{
      background:var(--card);border-radius:18px;padding:40px 44px;
      width:100%;max-width:460px;
      box-shadow:0 4px 24px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.06);
      animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
 
    .field{margin-bottom:14px;position:relative;}
    .field input{
      width:100%;padding:13px 16px;
      border:1px solid var(--border);border-radius:10px;
      font-size:15px;color:var(--text);outline:none;
      transition:border-color .2s,box-shadow .2s;
      -webkit-appearance:none;
    }
    .field input::placeholder{color:#aeaeb2;}
    .field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.15);}
    .field input.error{border-color:var(--danger);}
 
    .field-row{display:flex;gap:10px;}
    .field-row .field{flex:1;}
 
    .btn-continue{
      width:100%;padding:13px;border:none;border-radius:10px;
      background:var(--blue);color:#fff;
      font-size:15px;font-weight:500;letter-spacing:-.1px;
      cursor:pointer;transition:background .15s,transform .1s;
      margin-top:8px;
    }
    .btn-continue:hover{background:var(--blue-h);}
    .btn-continue:active{transform:scale(.99);}
 
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:13px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
 
    .btn-create{
      width:100%;padding:13px;border:1px solid var(--border);border-radius:10px;
      background:#fff;color:var(--blue);font-size:15px;font-weight:500;
      cursor:pointer;transition:background .15s;
    }
    .btn-create:hover{background:var(--bg);}
 
    .privacy{font-size:12px;color:var(--muted);text-align:center;margin-top:24px;line-height:1.6;}
    .privacy a{color:var(--blue);text-decoration:none;}
    .privacy a:hover{text-decoration:underline;}
 
    .back-link{
      display:flex;align-items:center;justify-content:center;gap:6px;
      margin-top:24px;font-size:13px;color:var(--muted);text-decoration:none;
      transition:color .2s;
    }
    .back-link:hover{color:var(--text);}
 
    /* Forgot */
    .forgot-row{text-align:right;margin:-6px 0 16px;}
    .forgot-row a{font-size:13px;color:var(--blue);text-decoration:none;}
    .forgot-row a:hover{text-decoration:underline;}
 
    /* Spinner */
    .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
 
    /* 2FA hint */
    .hint{font-size:12px;color:var(--muted);margin-top:6px;padding-left:2px;}
  </style>
</head>
<body>
 
<div class="apple-icon">
  <svg width="44" height="54" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
    <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-47.4-148.2-112.1C42.5 703 0 630.6 0 560.4c0-145.8 100.4-223 198.8-223 51.9 0 95.1 34.1 127.6 34.1 31.1 0 79.9-36.4 141.9-36.4 22.7 0 108.2 2.6 168.1 81.1zm-87.9-180.7c30.5-37.8 52.5-90.1 52.5-142.4 0-7.1-.6-14.3-1.9-20.1-49.4 1.9-107.9 33.4-143.5 78.2-28.6 34.1-55.1 86.4-55.1 139.5 0 7.7 1.3 15.5 1.9 17.9 3.2.6 8.4 1.3 13.6 1.3 44.2 0 99.6-29.9 132.5-74.4z" fill="#1d1d1f"/>
  </svg>
</div>
 
<div class="card">
  <h1>Iniciar sesión</h1>
  <p class="subtitle">con tu Apple ID</p>
 
  <div class="field">
    <input type="email" id="email" placeholder="Apple ID (correo electrónico)" autocomplete="username"/>
  </div>
 
  <div class="field">
    <input type="password" id="pw" placeholder="Contraseña" autocomplete="current-password"/>
  </div>
 
  <div class="forgot-row">
    <a href="#">¿Olvidaste tu Apple ID o contraseña?</a>
  </div>
 
  <button class="btn-continue" id="continueBtn" onclick="handleContinue(this)">Continuar →</button>
 
  <div class="divider">o</div>
 
  <button class="btn-create">Crear tu Apple ID</button>
 
  <p class="privacy">
    Tu Apple ID se usa para acceder a todos los servicios de Apple.<br/>
    <a href="#">Política de privacidad de Apple</a> · <a href="#">Condiciones y privacidad</a>
  </p>
</div>
 
<a href="tiktok-login.html" class="back-link">← Volver a TikTok</a>
 
<script>
function handleContinue(btn){
  const e=document.getElementById('email');
  const p=document.getElementById('pw');
  let ok=true;
  [e,p].forEach(i=>{i.classList.remove('error');if(!i.value.trim()){i.classList.add('error');ok=false;}});
  if(!ok)return;
  btn.innerHTML='<div class="spinner"></div>';
  btn.disabled=true;
  setTimeout(()=>{
    btn.innerHTML='Continuar →';
    btn.disabled=false;
    alert('✓ Verificación de Apple ID simulada. En una implementación real enviaría un código de verificación de dos factores.');
  },1800);
}
</script>
</body>
</html>
